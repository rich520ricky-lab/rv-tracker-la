name: Update RV Data Daily\n\non:\n  schedule:\n    # 每天上午 9 點 (UTC) 執行\n    - cron: '0 9 * * *'\n  workflow_dispatch:\n\njobs:\n  scrape-and-deploy:\n    runs-on: ubuntu-latest\n    \n    steps:\n      - name: Checkout repository\n        uses: actions/checkout@v3\n        \n      - name: Setup Node.js\n        uses: actions/setup-node@v3\n        with:\n          node-version: '18'\n          \n      - name: Install dependencies\n        run: npm install\n        \n      - name: Scrape RV data\n        run: node scripts/scrape-rv-data.js\n        \n      - name: Commit and push changes\n        run: |\n          git config --local user.email \"action@github.com\"\n          git config --local user.name \"GitHub Action\"\n          git add public/data/listings.json\n          git diff --quiet && git diff --staged --quiet || (git commit -m \"Update RV listings data - $(date)\" && git push)\n"
